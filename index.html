<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五行星轨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        /* 故事文字容器 */
        .story-overlay {
            position: fixed;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        .story-line {
            font-size: 18px;
            color: rgba(255,255,255,0);
            letter-spacing: 6px;
            line-height: 2.4;
            opacity: 0;
            transition: opacity 1.2s ease, color 1.2s ease;
        }
        .story-line.show {
            opacity: 1;
            color: rgba(255,255,255,0.75);
        }
        /* 点击提示 */
        .click-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 14px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 6px;
            pointer-events: none;
            animation: hintPulse 3s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="story-overlay" id="storyOverlay">
        <div class="story-line" id="line1">星河失序，二十八宿坠入混沌。</div>
        <div class="story-line" id="line2">四象之力被星兽吞噬，五行符阵也随之崩裂。</div>
        <div class="story-line" id="line3">你是最后的执阵者，需要以五行卡牌重连星轨，使四象归位。</div>
    </div>
    <div class="click-hint" id="clickHint">点击星核开始</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, dpr;

        function resize() {
            dpr = devicePixelRatio;
            W = canvas.width = window.innerWidth * dpr;
            H = canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        const CX = () => window.innerWidth / 2;
        const CY = () => window.innerHeight / 2;
        const ORB_R = Math.min(window.innerWidth, window.innerHeight) * 0.28;

        // Perlin noise
        const perm = new Uint8Array(512);
        (() => {
            const p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
            for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
        })();

        function noise3D(x, y, z) {
            const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
            x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
            const u = x * x * x * (x * (x * 6 - 15) + 10);
            const v = y * y * y * (y * (y * 6 - 15) + 10);
            const w = z * z * z * (z * (z * 6 - 15) + 10);
            const A = perm[X] + Y, AA = perm[A] + Z, AB = perm[A + 1] + Z;
            const B = perm[X + 1] + Y, BA = perm[B] + Z, BB = perm[B + 1] + Z;
            const grad = (h, x, y, z) => {
                const hh = h & 15;
                const uu = hh < 8 ? x : y;
                const vv = hh < 4 ? y : (hh === 12 || hh === 14 ? x : z);
                return ((hh & 1) === 0 ? uu : -uu) + ((hh & 2) === 0 ? vv : -vv);
            };
            return (grad(perm[AA], x, y, z) * (1 - u) + grad(perm[BA], x - 1, y, z) * u) * (1 - v) +
                   (grad(perm[AB], x, y - 1, z) * (1 - u) + grad(perm[BB], x - 1, y - 1, z) * u) * v;
        }

        // 球面粒子
        const TOTAL_PARTICLES = 2000;
        const particles = [];
        const RING_COUNT = 8;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                this.basePhi = phi;
                this.baseTheta = theta;
                this.radius = ORB_R * (0.7 + Math.random() * 0.3);
                this.flowSpeed = 0.3 + Math.random() * 0.7;
                this.flowOffset = Math.random() * Math.PI * 2;
                this.size = 0.4 + Math.random() * 1.6;
                this.hue = [280, 200, 40, 160, 320, 180, 30, 260][Math.floor(Math.random() * 8)] + (Math.random() - 0.5) * 15;
                this.alpha = 0;
            }
        }

        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            particles.push(new Particle());
        }

        function updateParticles(time) {
            const t = time * 0.0003;
            for (const p of particles) {
                const nScale = 0.002;
                const nx = Math.sin(p.basePhi) * Math.cos(p.baseTheta) * nScale + t * p.flowSpeed;
                const ny = Math.sin(p.basePhi) * Math.sin(p.baseTheta) * nScale + 100;
                const nz = Math.cos(p.basePhi) * nScale + t * p.flowSpeed * 1.5;

                const noiseVal = noise3D(nx, ny, nz);
                const displacement = noiseVal * 25;

                p.phi = p.basePhi + displacement * 0.008;
                p.theta = p.baseTheta + t * p.flowSpeed + noiseVal * 0.3;
                p.r = p.radius + noiseVal * 3;
                p.alpha = 0.3 + (noiseVal + 1) * 0.35;
            }
        }

        function render(time) {
            const cx = CX(), cy = CY();
            ctx.clearRect(0, 0, W, H);

            // 外层大光晕
            const outerGlow = ctx.createRadialGradient(cx, cy, ORB_R * 0.3, cx, cy, ORB_R * 1.3);
            outerGlow.addColorStop(0, 'rgba(0,0,0,0)');
            outerGlow.addColorStop(0.5, 'rgba(160,140,200,0.02)');
            outerGlow.addColorStop(0.8, 'rgba(100,180,200,0.015)');
            outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = outerGlow;
            ctx.beginPath();
            ctx.arc(cx, cy, ORB_R * 1.3, 0, Math.PI * 2);
            ctx.fill();

            // 粒子
            const sorted = [...particles].sort((a, b) => {
                const za = Math.cos(a.phi);
                const zb = Math.cos(b.phi);
                return za - zb;
            });

            for (const p of sorted) {
                if (p.alpha < 0.05) continue;
                const x = cx + Math.sin(p.phi) * Math.cos(p.theta) * p.r;
                const y = cy + Math.sin(p.phi) * Math.sin(p.theta) * p.r;
                const depth = Math.cos(p.phi);
                const alpha = p.alpha * (0.3 + (depth + 1) * 0.35);
                const size = p.size * (0.5 + (depth + 1) * 0.25);

                ctx.fillStyle = `hsla(${p.hue}, 50%, ${40 + (depth + 1) * 25}%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 环线
            const t = time * 0.0005;
            const ringColors = [280, 200, 40, 160, 320, 180, 30, 260];
            for (let ri = 0; ri < RING_COUNT; ri++) {
                const ringR = ORB_R * (0.45 + ri * 0.07);
                const tiltX = Math.sin(t * 1.5 + ri * 0.7) * 0.3;
                const tiltY = Math.cos(t * 1.2 + ri * 0.9) * 0.3;
                const segments = 120;
                const hue = ringColors[ri % ringColors.length];
                const alpha = 0.04 + ri * 0.01;

                ctx.strokeStyle = `hsla(${hue}, 50%, 60%, ${alpha})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                for (let si = 0; si <= segments; si++) {
                    const angle = (si / segments) * Math.PI * 2;
                    const bx = Math.cos(angle) * ringR;
                    const by = Math.sin(angle) * ringR;
                    const px = cx + bx * Math.cos(tiltX) - by * Math.sin(tiltY) * 0.3;
                    const py = cy + bx * Math.sin(tiltX) * 0.5 + by * Math.cos(tiltY);
                    if (si === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
            }

            // 中心核心光
            const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, ORB_R * 0.2);
            core.addColorStop(0, 'rgba(220,200,255,0.3)');
            core.addColorStop(0.3, 'rgba(180,160,220,0.1)');
            core.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = core;
            ctx.beginPath();
            ctx.arc(cx, cy, ORB_R * 0.2, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop(time) {
            updateParticles(time);
            render(time);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // 点击粒子球后显示故事文字
        let storyRevealed = false;
        let canEnter = false;

        document.body.addEventListener('click', (e) => {
            if (storyRevealed && canEnter) {
                // 文字已全部显示，点击进入四象首页
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.6s ease';
                setTimeout(() => {
                    window.location.href = 'page2.html';
                }, 600);
                return;
            }
            if (storyRevealed) return;

            storyRevealed = true;

            // 隐藏点击提示
            document.getElementById('clickHint').style.opacity = '0';
            document.getElementById('clickHint').style.transition = 'opacity 0.5s ease';

            // 逐行显示文字
            const line1 = document.getElementById('line1');
            const line2 = document.getElementById('line2');
            const line3 = document.getElementById('line3');

            setTimeout(() => {
                line1.classList.add('show');
            }, 400);

            setTimeout(() => {
                line2.classList.add('show');
            }, 2000);

            setTimeout(() => {
                line3.classList.add('show');
                // 第三行显示后，提示再次点击进入
                setTimeout(() => {
                    canEnter = true;
                    const hint = document.getElementById('clickHint');
                    hint.textContent = '再次点击星核 · 开启旅程';
                    hint.style.opacity = '1';
                }, 1200);
            }, 4000);
        });
    </script>
</body>
</html>
