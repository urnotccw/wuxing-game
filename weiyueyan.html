<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>危月燕 - 月影抉择</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            padding: 6px 20px;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .event-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* 背景月光效果 */
        .event-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            object-fit: contain;
            opacity: 0.5;
            pointer-events: none;
        }
        .moon-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at 30% 20%, rgba(200,220,255,0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .event-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .event-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 6px;
            color: rgba(200,220,255,0.9);
            margin-bottom: 24px;
            text-shadow: 0 0 30px rgba(200,220,255,0.3);
        }

        .event-narrative {
            font-size: 15px;
            line-height: 1.9;
            color: rgba(255,255,255,0.75);
            margin-bottom: 40px;
            padding: 0 20px;
            letter-spacing: 1px;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 580px;
            margin: 0 auto;
        }

        .choice-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #fff;
        }
        .choice-btn:hover {
            background: rgba(200,220,255,0.08);
            border-color: rgba(200,220,255,0.35);
            box-shadow: 0 0 25px rgba(200,220,255,0.1);
            transform: translateY(-2px);
        }
        .choice-btn .choice-name {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            color: rgba(200,220,255,0.85);
            margin-bottom: 6px;
        }
        .choice-btn .choice-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
        }
        .choice-btn .choice-tag {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 6px;
            font-style: italic;
        }
        .choice-btn.leave .choice-name {
            color: rgba(255,255,255,0.4);
        }
        .choice-btn.leave:hover {
            border-color: rgba(255,255,255,0.2);
            box-shadow: none;
            transform: none;
        }

        /* 升级选牌面板 */
        .upgrade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .upgrade-overlay.show { display: flex; }
        .upgrade-panel {
            background: rgba(10,10,20,0.95);
            border: 1px solid rgba(200,220,255,0.2);
            border-radius: 16px;
            padding: 30px;
            max-width: 520px;
            width: 90%;
            text-align: center;
        }
        .upgrade-title {
            font-size: 18px;
            color: rgba(200,220,255,0.9);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .upgrade-hint {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }
        .upgrade-hint strong {
            color: #ffd43b;
        }
        .upgrade-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .upgrade-card {
            aspect-ratio: 2 / 3;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        .upgrade-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upgrade-card:hover {
            border-color: rgba(200,220,255,0.5);
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(200,220,255,0.2);
        }
        .upgrade-card.selected {
            border-color: #ffd43b;
            box-shadow: 0 0 25px rgba(255,212,59,0.3);
        }
        .upgrade-card .upgrade-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: #ffd43b;
            font-size: 11px;
            padding: 4px;
            text-align: center;
            letter-spacing: 1px;
        }
        .upgrade-card .upgrade-value {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .upgrade-empty {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            padding: 30px;
            grid-column: 1 / -1;
        }
        .upgrade-confirm-btn {
            background: rgba(200,220,255,0.1);
            border: 1px solid rgba(200,220,255,0.25);
            border-radius: 10px;
            padding: 10px 30px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            opacity: 0.4;
            pointer-events: none;
        }
        .upgrade-confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
            background: rgba(200,220,255,0.15);
            border-color: rgba(200,220,255,0.4);
        }
        .upgrade-confirm-btn.active:hover {
            background: rgba(200,220,255,0.25);
            box-shadow: 0 0 20px rgba(200,220,255,0.15);
        }

        .event-footer {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        .next-level-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(180, 160, 220, 0.15);
            border: 1px solid rgba(180, 160, 220, 0.3);
            color: rgba(220, 210, 255, 0.9);
            font-size: 15px;
            padding: 10px 40px;
            border-radius: 24px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        .next-level-btn:hover {
            background: rgba(180, 160, 220, 0.25);
            border-color: rgba(180, 160, 220, 0.5);
            box-shadow: 0 0 20px rgba(160, 140, 200, 0.2);
        }
        .event-footer {
            z-index: 2;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-content { animation: fadeIn 1s ease-out; }
        .choices { animation: fadeIn 1.2s ease-out; }
        .upgrade-panel { animation: fadeIn 0.4s ease-out; }
        /* 音量控制按钮 */
        .volume-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 30;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }
        .volume-slider-wrap {
            position: fixed;
            top: 20px;
            right: 72px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .volume-slider-wrap.show {
            opacity: 1;
            pointer-events: auto;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(200, 180, 240, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            background: rgba(220, 200, 255, 1);
            box-shadow: 0 0 12px rgba(180, 150, 220, 0.5);
        }
        .volume-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            min-width: 28px;
            text-align: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="Moonlit Jade Drift.mp3" loop preload="auto"></audio>
    <button class="back-btn" onclick="location.href='beast.html'">← 返回</button>
    <!-- 音量控制 -->
    <button class="volume-btn" id="volumeBtn" onclick="toggleVolume()" title="音量">🔊</button>
    <div class="volume-slider-wrap" id="volumeSliderWrap">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" oninput="onVolumeChange(this.value)">
        <span class="volume-label" id="volumeLabel">50%</span>
    </div>

    <img class="event-bg" src="危月燕.png" alt="" onerror="this.style.display='none'">
    <div class="moon-overlay"></div>

    <div class="event-container">
        <div class="event-content">
            <div class="event-title">✦ 危月燕 · 月影抉择 ✦</div>
            <div class="event-narrative">
                危月燕掠过残破星盘，月光照出未来的牌序。<br>
                它没有攻击你，只留下一道月影，<br>
                让你选择是否改写接下来的命运。
            </div>

            <div class="choices">
                <div class="choice-btn" onclick="selectChoice('draw')">
                    <div class="choice-name">🌙 观星</div>
                    <div class="choice-desc">下一场战斗开局额外抽 1 张牌</div>
                    <div class="choice-tag">稳定收益，适合新手</div>
                </div>
                <div class="choice-btn" onclick="selectChoice('dodge')">
                    <div class="choice-name">🌙 月影避祸</div>
                    <div class="choice-desc">下一场战斗中，第一次受到伤害减少8点</div>
                    <div class="choice-tag">保命防身</div>
                </div>
                <div class="choice-btn" onclick="selectChoice('buff')">
                    <div class="choice-name">🌙 延迟祝福</div>
                    <div class="choice-desc">下一场战斗第一次小结算效果 ×1.5</div>
                    <div class="choice-tag">鼓励玩家开局打组合</div>
                </div>
                <div class="choice-btn leave" onclick="selectChoice('leave')">
                    <div class="choice-name">离开</div>
                    <div class="choice-desc">什么都不发生</div>
                    <div class="choice-tag">保守选项，可选</div>
                </div>
            </div>
        </div>
    </div>

    <div class="event-footer">— 危月燕的馈赠仅此一次 —</div>

    <button class="next-level-btn" id="nextLevelBtn" onclick="goToNextLevel()" style="display:none;">下一关 →</button>

    <script>
        // 检查是否已完成过危月燕事件
        if (sessionStorage.getItem('weiyueyanDone') === 'true') {
            // 已做过事件，直接跳回 beast.html
            window.location.href = 'beast.html';
        }

        function markWeiyueyanCleared() {
            const cleared = JSON.parse(sessionStorage.getItem('clearedBeasts') || '[]');
            if (!cleared.includes('危月燕')) {
                cleared.push('危月燕');
                sessionStorage.setItem('clearedBeasts', JSON.stringify(cleared));
            }
        }

        function selectChoice(choice) {
            sessionStorage.setItem('weiyueyanChoice', choice);
            sessionStorage.setItem('weiyueyanDone', 'true');
            markWeiyueyanCleared();
            // 隐藏选项，显示下一关按钮
            document.querySelector('.choices').style.display = 'none';
            document.querySelector('.event-footer').style.display = 'none';
            document.getElementById('nextLevelBtn').style.display = 'block';
        }

        function goToNextLevel() {
            sessionStorage.setItem('beastName', '玄武');
            sessionStorage.setItem('battleLevel', '2');
            window.location.href = 'battle.html';
        }
        // 背景音乐与音量控制
        const bgMusic = document.getElementById('bgMusic');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');
        const volumeSliderWrap = document.getElementById('volumeSliderWrap');
        let volumeVisible = false;
        const savedVol = sessionStorage.getItem('bgMusicVolume');
        if (savedVol !== null) {
            volumeSlider.value = savedVol;
            volumeLabel.textContent = savedVol + '%';
        }
        bgMusic.volume = volumeSlider.value / 100;
        updateVolumeIcon();
        function tryPlayMusic() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => { updateVolumeIcon(); }).catch(() => {});
            }
        }
        document.addEventListener('click', tryPlayMusic, { once: false });
        function toggleVolume() {
            volumeVisible = !volumeVisible;
            if (volumeVisible) { volumeSliderWrap.classList.add('show'); }
            else { volumeSliderWrap.classList.remove('show'); }
        }
        function onVolumeChange(val) {
            bgMusic.volume = val / 100;
            volumeLabel.textContent = val + '%';
            sessionStorage.setItem('bgMusicVolume', val);
            updateVolumeIcon();
        }
        function updateVolumeIcon() {
            const vol = volumeSlider.value / 100;
            if (vol <= 0 || bgMusic.muted) { volumeBtn.textContent = '🔇'; }
            else if (vol < 0.33) { volumeBtn.textContent = '🔈'; }
            else if (vol < 0.66) { volumeBtn.textContent = '🔉'; }
            else { volumeBtn.textContent = '🔊'; }
        }
        document.addEventListener('click', function(e) {
            if (volumeVisible && !e.target.closest('#volumeBtn') && !e.target.closest('#volumeSliderWrap')) {
                volumeVisible = false;
                volumeSliderWrap.classList.remove('show');
            }
        });    </script>
</body>
</html>
