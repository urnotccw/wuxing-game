<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星宿详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            padding: 6px 20px;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        /* 牌库按钮 */
        .deck-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 25;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .deck-toggle:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .deck-icon { font-size: 18px; }

        /* 牌库面板 */
        .deck-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            z-index: 30;
            width: 320px;
            max-height: 50vh;
            background: rgba(0,0,0,0.92);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            display: none;
            flex-direction: column;
        }
        .deck-panel.show { display: flex; }
        .deck-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        .deck-close {
            cursor: pointer;
            font-size: 20px;
            color: rgba(255,255,255,0.5);
            line-height: 1;
        }
        .deck-close:hover { color: #fff; }
        .deck-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            overflow-y: auto;
            max-height: 40vh;
        }
        .deck-list .deck-card {
            position: relative;
            aspect-ratio: 2 / 3;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
        }
        .deck-list .deck-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .deck-count-tag {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: #ffd43b;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            letter-spacing: 1px;
        }
        .deck-empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            padding: 20px;
        }

        /* 卡牌悬浮提示 */
        .card-tooltip {
            position: fixed;
            z-index: 9999;
            background: rgba(0,0,0,0.95);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 220px;
            max-width: 280px;
            color: #fff;
            font-size: 12px;
            line-height: 1.6;
            pointer-events: none;
            display: none;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .card-tooltip.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .card-tooltip .tt-name {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-tooltip .tt-element {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        .card-tooltip .tt-base {
            color: #fff;
            margin: 4px 0;
        }
        .card-tooltip .tt-special {
            color: #ffd43b;
            margin: 4px 0;
        }
        .card-tooltip .tt-role {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }

        /* 底图容器 - 撑满全屏 */
        .base-map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .base-map {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            opacity: 0.6;
        }

        /* 星宿图片叠加层 */
        .star-overlay {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1;
        }
        .star-overlay:hover {
            transform: translate(-50%, -50%) scale(1.2) !important;
            z-index: 10;
        }
        .star-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            object-fit: cover;
            background: transparent;
            display: block;
            animation: glowBreath 2.5s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        .star-overlay.cleared .star-pic {
            filter: grayscale(0.5) brightness(0.7);
            animation: none;
            box-shadow: 0 0 15px rgba(100,255,100,0.4);
        }
        .star-overlay.locked .star-pic {
            filter: grayscale(0.8) brightness(0.35);
            animation: none;
        }
        .locked-tag {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(0,0,0,0.8);
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
            pointer-events: none;
        }
        .cleared-tag {
            position: absolute;
            top: -4px; right: -4px;
            z-index: 5;
            background: #51cf66;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(81,207,102,0.5);
            pointer-events: none;
        }
        @keyframes glowBreath {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255,255,255,0.3), 0 0 30px rgba(255,255,255,0.1), 0 0 50px rgba(255,255,255,0.05);
            }
            50% {
                box-shadow: 0 0 25px rgba(255,255,255,0.55), 0 0 50px rgba(255,255,255,0.2), 0 0 80px rgba(255,255,255,0.1);
            }
        }
        .star-name {
            display: none;
        }
        /* 音量控制按钮 */
        .volume-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 30;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }
        .volume-slider-wrap {
            position: fixed;
            top: 20px;
            right: 72px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .volume-slider-wrap.show {
            opacity: 1;
            pointer-events: auto;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(200, 180, 240, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            background: rgba(220, 200, 255, 1);
            box-shadow: 0 0 12px rgba(180, 150, 220, 0.5);
        }
        .volume-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            min-width: 28px;
            text-align: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="Moonlit Jade Drift.mp3" loop preload="auto"></audio>
    <button class="back-btn" onclick="location.href='page2.html'">← 返回</button>
    <button class="back-btn" style="top:20px; left:auto; right:80px;" onclick="location.href='page2.html'">主页</button>
    <!-- 音量控制 -->
    <button class="volume-btn" id="volumeBtn" onclick="toggleVolume()" title="音量">🔊</button>
    <div class="volume-slider-wrap" id="volumeSliderWrap">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" oninput="onVolumeChange(this.value)">
        <span class="volume-label" id="volumeLabel">50%</span>
    </div>

    <div class="deck-toggle" id="deckToggle" onclick="toggleDeck()">
        <span class="deck-icon">🃏</span>
        <span class="deck-text">牌库 <span id="deckCount">0</span></span>
    </div>

    <div class="deck-panel" id="deckPanel">
        <div class="deck-panel-header">
            <span>我的牌库</span>
            <span class="deck-close" onclick="toggleDeck()">×</span>
        </div>
        <div class="deck-list" id="deckList"></div>
    </div>

    <div class="card-tooltip" id="cardTooltip"></div>

    <div class="base-map-container" id="mapContainer">
        <img class="base-map" id="baseMap" src="" alt="底图">
        <div id="overlayContainer"></div>
    </div>

    <script>
        // 15张卡牌详细数据
        const CARD_DATA = {
            '火':     { element: '火', base: '造成6点伤害', special: '无', role: '基础输出' },
            '金':     { element: '金', base: '造成5点伤害', special: '无', role: '稳定输出' },
            '木':     { element: '木', base: '回复3点生命', special: '不超过生命上限', role: '基础回复' },
            '水':     { element: '水', base: '获得4点护盾', special: '护盾本回合有效', role: '基础防御' },
            '土':     { element: '土', base: '获得6点护盾', special: '护盾本回合有效', role: '高防御' },
            '玫瑰火': { element: '火', base: '造成7点伤害', special: '如果被木生火强化，额外回复1点生命', role: '输出+小回复' },
            '羽毛火': { element: '火', base: '造成4点伤害', special: '1点灼烧持续2回合', role: '持续输出' },
            '虎爪金': { element: '金', base: '造成6点伤害', special: '如果敌人有护盾，额外造成3点破盾伤害', role: '破盾输出' },
            '星星金': { element: '金', base: '造成4点伤害', special: '本次大结算额外+3伤害，最多触发1次', role: '大结算辅助' },
            '莲花木': { element: '木', base: '回复4点生命', special: '如果被水生木强化，额外获得2点护盾', role: '回复+防御' },
            '鹿木':   { element: '木', base: '回复2点生命', special: '本回合下一张伤害牌额外+2伤害', role: '辅助增伤' },
            '冰水':   { element: '水', base: '获得6点护盾', special: '如果被金生水强化，敌人下回合攻击-1', role: '防御+减伤' },
            '月亮水': { element: '水', base: '获得4点护盾', special: '敌人下回合攻击-1；如果触发大结算额外再-1', role: '控制防御' },
            '琥珀土': { element: '土', base: '获得6点护盾', special: '同时回复1点生命', role: '防御+回复' },
            '山土':   { element: '土', base: '获得8点护盾', special: '如果本回合触发大结算，额外获得3点护盾', role: '高额防御' },
        };

        const ELEMENT_COLORS = {
            '金': '#ffd700',
            '木': '#51cf66',
            '水': '#4dabf7',
            '火': '#ff6b6b',
            '土': '#d4a373'
        };

        // 卡牌悬浮提示
        function showCardTooltip(cardName, e) {
            const cleanName = cardName.replace('+1', '');
            const data = CARD_DATA[cleanName];
            if (!data) return;
            const isUpgraded = cardName !== cleanName;
            const tip = document.getElementById('cardTooltip');
            const elColor = ELEMENT_COLORS[data.element] || '#fff';
            const upgradeTag = isUpgraded ? '<span style="color:#ffd43b;font-size:11px;margin-left:8px;">✨ +1</span>' : '';
            tip.innerHTML = `
                <div class="tt-name">
                    <span>${cleanName}${upgradeTag}</span>
                    <span class="tt-element" style="color:${elColor}">${data.element}</span>
                </div>
                <div class="tt-base">基础：${data.base}${isUpgraded ? ' <span style="color:#ffd43b">→ 数值 +1</span>' : ''}</div>
                <div class="tt-special">特殊：${data.special}</div>
                <div class="tt-role">定位：${data.role}</div>
            `;
            // 先显示再计算位置，确保 getBoundingClientRect 有效
            tip.style.display = 'block';
            tip.style.left = '0px';
            tip.style.top = '0px';
            const x = e.clientX + 20;
            const y = e.clientY - 20;
            const rect = tip.getBoundingClientRect();
            const maxX = window.innerWidth - rect.width - 10;
            const maxY = window.innerHeight - rect.height - 10;
            tip.style.left = Math.min(x, maxX) + 'px';
            tip.style.top = Math.min(y, maxY) + 'px';
            tip.classList.add('show');
        }

        function moveCardTooltip(e) {
            const tip = document.getElementById('cardTooltip');
            if (!tip.classList.contains('show')) return;
            const x = e.clientX + 20;
            const y = e.clientY - 20;
            const rect = tip.getBoundingClientRect();
            const maxX = window.innerWidth - rect.width - 10;
            const maxY = window.innerHeight - rect.height - 10;
            tip.style.left = Math.min(x, maxX) + 'px';
            tip.style.top = Math.min(y, maxY) + 'px';
        }

        function hideCardTooltip() {
            const tip = document.getElementById('cardTooltip');
            tip.classList.remove('show');
            tip.style.display = 'none';
        }

        const name = sessionStorage.getItem('beastName') || '玄武';
        // 设置底图
        const baseMap = document.getElementById('baseMap');
        baseMap.src = name + '/' + name + '底图.png';

        const folder = name;
        const overlayContainer = document.getElementById('overlayContainer');
        const mapContainer = document.getElementById('mapContainer');

        // 根据四象切换星宿配置
        const BEAST_CONFIGS = {
            '玄武': {
                starPositions: [
                    { name: '壁水貐', left: '8%', top: 'calc(55% - 30px)', link: 'battle.html', level: 0, order: 1 },
                    { name: '室火猪', left: '22%', top: '42%', link: 'battle.html', level: 1, order: 2 },
                    { name: '危月燕', left: '36%', top: 'calc(35% + 80px)', link: 'weiyueyan.html', level: 2, order: 3 },
                    { name: '虚日鼠', left: '50%', top: 'calc(38% + 50px)', link: 'battle.html', level: 2, order: 4 },
                    { name: '女土蝠', left: '64%', top: '42%', link: 'battle.html', level: 3, order: 5 },
                    { name: '牛金牛', left: '78%', top: '48%', link: 'niujinniu.html', order: 6 },
                    { name: '斗木獬', left: '92%', top: 'calc(55% - 20px)', link: 'battle.html', level: 4, order: 7 },
                ]
            },
            '青龙': {
                starPositions: [
                    { name: '角木蛟', left: '8%', top: 'calc(55% - 30px)', link: 'battle.html', level: 0, order: 1 },
                    { name: '亢金龙', left: '22%', top: '42%', link: 'battle.html', level: 1, order: 2 },
                    { name: '氐土貉', left: '36%', top: 'calc(35% + 80px)', link: 'dituhe.html', order: 3 },
                    { name: '房日兔', left: '50%', top: 'calc(38% + 50px)', link: 'fangritu.html', order: 4 },
                    { name: '心月狐', left: '64%', top: '42%', link: 'battle.html', level: 2, order: 5 },
                    { name: '尾火虎', left: '78%', top: '48%', link: 'battle.html', level: 3, order: 6 },
                    { name: '箕水豹', left: '92%', top: 'calc(55% - 20px)', link: 'battle.html', level: 4, order: 7 },
                ]
            },
            '朱雀': {
                starPositions: [
                    { name: '井木犴', left: '8%', top: 'calc(55% - 60px)', link: 'battle.html', level: 0, order: 1 },
                    { name: '鬼金羊', left: '22%', top: '42%', link: 'battle.html', level: 1, order: 2 },
                    { name: '柳土獐', left: '36%', top: 'calc(35% + 80px)', link: 'liutuzhang.html', order: 3 },
                    { name: '星日马', left: '50%', top: 'calc(38% + 50px)', link: 'battle.html', level: 3, order: 4 },
                    { name: '张月鹿', left: '64%', top: '42%', link: 'zhangyuelu.html', order: 5 },
                    { name: '翼火蛇', left: '78%', top: '48%', link: 'battle.html', level: 5, order: 6 },
                    { name: '轸水蚓', left: '92%', top: 'calc(55% - 20px)', link: 'battle.html', level: 6, order: 7 },
                ]
            },
            '白虎': {
                starPositions: [
                    { name: '奎木狼', left: '8%', top: 'calc(55% - 30px)', link: 'battle.html', level: 0, order: 1 },
                    { name: '娄金狗', left: '22%', top: '42%', link: 'battle.html', level: 1, order: 2 },
                    { name: '胃土雉', left: '36%', top: 'calc(35% + 80px)', link: 'weitushi.html', order: 3 },
                    { name: '昴日鸡', left: '50%', top: 'calc(38% + 50px)', link: 'battle.html', level: 3, order: 4 },
                    { name: '毕月乌', left: '64%', top: '42%', link: 'biyuewu.html', order: 5 },
                    { name: '觜火猴', left: '78%', top: '48%', link: 'battle.html', level: 5, order: 6 },
                    { name: '参水猿', left: '92%', top: 'calc(55% - 20px)', link: 'battle.html', level: 6, order: 7 },
                ]
            }
        };
        const config = BEAST_CONFIGS[name] || BEAST_CONFIGS['玄武'];
        const starPositions = config.starPositions;

        function renderOverlays() {
            overlayContainer.innerHTML = '';
            // 读取已通关列表（按星宿名）
            const cleared = JSON.parse(sessionStorage.getItem('clearedBeasts') || '[]');
            console.log('已通关列表:', cleared);
            starPositions.forEach(pos => {
                const el = document.createElement('div');
                el.className = 'star-overlay';
                // 按星宿名检查是否已通关
                const isCleared = cleared.includes(pos.name) && !!pos.link;
                if (isCleared) el.classList.add('cleared');
                el.style.position = 'absolute';
                el.style.left = pos.left;
                el.style.top = pos.top;
                el.style.transform = 'translate(-50%, -50%)';

                // 顺序解锁：只有第1关或前1关已通关的关卡才可进入
                // TODO: 临时全部解锁方便测试
                const idx = starPositions.indexOf(pos);
                const isUnlocked = (idx === 0) || (idx > 0 && cleared.includes(starPositions[idx - 1].name));
                if (!isUnlocked) el.classList.add('locked');

                if (pos.link && !isCleared && isUnlocked) {
                    el.style.cursor = 'pointer';
                    el.onclick = () => {
                        // 切换大关时回满血
                        const prevBeast = sessionStorage.getItem('beastName');
                        if (prevBeast && prevBeast !== name) {
                            const maxHp = parseInt(sessionStorage.getItem('playerMaxHp') || '50', 10);
                            sessionStorage.setItem('playerHp', String(maxHp));
                        }
                        sessionStorage.setItem('beastName', name);
                        if (pos.level !== undefined) {
                            sessionStorage.setItem('battleLevel', String(pos.level));
                        }
                        if (pos.link === 'weiyueyan.html') {
                            sessionStorage.removeItem('weiyueyanDone');
                            sessionStorage.removeItem('weiyueyanChoice');
                            sessionStorage.removeItem('battleLevel');
                        }
                        if (pos.link === 'niujinniu.html') {
                            sessionStorage.removeItem('battleLevel');
                        }
                        location.href = pos.link;
                    };
                }
                // 已通关显示标记
                const clearedTag = isCleared ? '<div class="cleared-tag">✓ 已通过</div>' : '';
                const lockTag = (!isCleared && !isUnlocked) ? '<div class="locked-tag">🔒 未解锁</div>' : '';
                el.innerHTML = `
                    <img class="star-pic" src="${folder}/${pos.name}.png" alt="${pos.name}" onerror="this.style.display='none'">
                    ${clearedTag}
                    ${lockTag}
                `;
                overlayContainer.appendChild(el);
            });
        }

        renderOverlays();

        // 窗口大小改变时重新渲染
        window.addEventListener('resize', renderOverlays);

        // 牌库功能
        function toggleDeck() {
            const panel = document.getElementById('deckPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                renderDeckList();
            }
        }

        const INITIAL_DECK = [
            { name: '金', element: '金' }, { name: '金', element: '金' },
            { name: '木', element: '木' }, { name: '木', element: '木' },
            { name: '水', element: '水' }, { name: '水', element: '水' },
            { name: '火', element: '火' }, { name: '火', element: '火' },
            { name: '土', element: '土' }, { name: '土', element: '土' },
        ];

        function getDeckFromStorage() {
            try {
                const stored = sessionStorage.getItem('playerDeck');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                }
            } catch (e) {}
            return INITIAL_DECK.slice();
        }

        function renderDeckList() {
            const list = document.getElementById('deckList');
            const deck = getDeckFromStorage();
            list.innerHTML = '';
            if (deck.length === 0) {
                list.innerHTML = '<div class="deck-empty">牌库为空<br>赢得战斗可获得新卡牌</div>';
                return;
            }
            // 统计每种卡牌名数量
            const counts = {};
            deck.forEach(c => {
                const key = c.name || c.element;
                counts[key] = (counts[key] || 0) + 1;
            });
            // 按出现顺序展示
            const seen = new Set();
            deck.forEach(c => {
                const key = c.name || c.element;
                if (seen.has(key)) return;
                seen.add(key);
                const n = counts[key];
                const cardEl = document.createElement('div');
                cardEl.className = 'deck-card';
                const imgName = key.replace('+1', '');
                cardEl.innerHTML = `
                    <img src="卡牌/${imgName}.png" onerror="this.style.display='none'">
                    ${n > 1 ? `<div class="deck-count-tag">x${n}</div>` : ''}
                `;
                // 绑定 tooltip 事件
                cardEl.addEventListener('mouseenter', (e) => showCardTooltip(key, e));
                cardEl.addEventListener('mousemove', moveCardTooltip);
                cardEl.addEventListener('mouseleave', hideCardTooltip);
                list.appendChild(cardEl);
            });
        }

        // 初始化牌库数量
        document.getElementById('deckCount').textContent = getDeckFromStorage().length;

        // 背景音乐与音量控制
        // ============================================================
        const bgMusic = document.getElementById('bgMusic');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');
        const volumeSliderWrap = document.getElementById('volumeSliderWrap');
        let volumeVisible = false;

        // 恢复上次音量
        const savedVol = sessionStorage.getItem('bgMusicVolume');
        if (savedVol !== null) {
            volumeSlider.value = savedVol;
            volumeLabel.textContent = savedVol + '%';
        }
        bgMusic.volume = volumeSlider.value / 100;
        updateVolumeIcon();

        // 用户每次点击页面时尝试播放（直到成功）
        function tryPlayMusic() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    updateVolumeIcon();
                }).catch(() => {});
            }
        }
        document.addEventListener('click', tryPlayMusic, { once: false });

        function toggleVolume() {
            volumeVisible = !volumeVisible;
            if (volumeVisible) {
                volumeSliderWrap.classList.add('show');
            } else {
                volumeSliderWrap.classList.remove('show');
            }
        }

        function onVolumeChange(val) {
            bgMusic.volume = val / 100;
            volumeLabel.textContent = val + '%';
            sessionStorage.setItem('bgMusicVolume', val);
            updateVolumeIcon();
        }

        function updateVolumeIcon() {
            const vol = volumeSlider.value / 100;
            if (vol <= 0 || bgMusic.muted) {
                volumeBtn.textContent = '🔇';
            } else if (vol < 0.33) {
                volumeBtn.textContent = '🔈';
            } else if (vol < 0.66) {
                volumeBtn.textContent = '🔉';
            } else {
                volumeBtn.textContent = '🔊';
            }
        }

        // 点击页面其他区域关闭滑块
        document.addEventListener('click', function(e) {
            if (volumeVisible && !e.target.closest('#volumeBtn') && !e.target.closest('#volumeSliderWrap')) {
                volumeVisible = false;
                volumeSliderWrap.classList.remove('show');
            }
        });
    </script>
</body>
</html>
