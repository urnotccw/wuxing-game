<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星河符阵 · 已成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            cursor: pointer;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        .ending-overlay {
            position: fixed;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 700px;
        }
        .ending-line {
            color: rgba(255,255,255,0);
            letter-spacing: 6px;
            line-height: 2.2;
            opacity: 0;
            transition: opacity 1.8s ease, color 1.8s ease;
        }
        .ending-line.show {
            opacity: 1;
            color: rgba(255,255,255,0.8);
        }
        .ending-line.title-line {
            font-size: 22px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            color: rgba(255,215,120,0);
            font-weight: 500;
        }
        .ending-line.title-line.show {
            color: rgba(255,215,120,0.9);
        }
        .ending-line.body-line {
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 12px;
        }
        .ending-line.final-line {
            font-size: 20px;
            letter-spacing: 10px;
            margin-top: 24px;
            font-weight: 500;
            color: rgba(200,180,240,0);
        }
        .ending-line.final-line.show {
            color: rgba(200,180,240,0.9);
        }

        .restart-hint {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .restart-hint.show {
            opacity: 1;
            animation: hintPulse 3s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ending-overlay" id="endingOverlay">
        <div class="ending-line title-line" id="line0">二十八宿，归位。</div>
        <div class="ending-line body-line" id="line1">东方青龙重连生发之轨，南方朱雀燃起不灭星火，</div>
        <div class="ending-line body-line" id="line2">西方白虎收束肃杀之气，北方玄武镇回深水之渊。</div>
        <div class="ending-line body-line" id="line3">失序的星河再次流转，崩裂的五行符阵于黑夜中重成。</div>
        <div class="ending-line body-line" id="line4">你收起最后一张符牌，星光从阵眼升起。</div>
        <div class="ending-line body-line" id="line5">此后，星宿不再坠落，四象各归其位。</div>
        <div class="ending-line final-line" id="line6">星河符阵，已成。</div>
    </div>
    <div class="restart-hint" id="restartHint">点击任意位置 · 重返星轨</div>

    <script>
        // 粒子背景
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, dpr;

        function resize() {
            dpr = devicePixelRatio;
            W = canvas.width = window.innerWidth * dpr;
            H = canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        const CX = () => window.innerWidth / 2;
        const CY = () => window.innerHeight / 2;

        // 粒子
        const particles = [];
        const PARTICLE_COUNT = 400;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: 0.3 + Math.random() * 1.2,
                alpha: 0.1 + Math.random() * 0.4,
                twinkle: Math.random() * Math.PI * 2,
                twinkleSpeed: 0.005 + Math.random() * 0.02
            });
        }

        function render(time) {
            const cx = CX(), cy = CY();
            ctx.clearRect(0, 0, W, H);

            // 粒子
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = window.innerWidth;
                if (p.x > window.innerWidth) p.x = 0;
                if (p.y < 0) p.y = window.innerHeight;
                if (p.y > window.innerHeight) p.y = 0;

                p.twinkle += p.twinkleSpeed;
                const alpha = p.alpha * (0.5 + 0.5 * Math.sin(p.twinkle));

                ctx.fillStyle = `rgba(200,180,240,${alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 中心柔光
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
            glow.addColorStop(0, 'rgba(200,180,240,0.06)');
            glow.addColorStop(0.5, 'rgba(160,140,200,0.03)');
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(cx, cy, 200, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop(time) {
            render(time);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // 逐行显示结局文字
        const lines = [
            { id: 'line0', delay: 500 },
            { id: 'line1', delay: 2500 },
            { id: 'line2', delay: 4200 },
            { id: 'line3', delay: 6200 },
            { id: 'line4', delay: 8200 },
            { id: 'line5', delay: 10000 },
            { id: 'line6', delay: 12000 },
        ];

        let allShown = false;
        lines.forEach(({ id, delay }) => {
            setTimeout(() => {
                document.getElementById(id).classList.add('show');
            }, delay);
        });

        // 最后一行显示后，显示返回提示
        setTimeout(() => {
            allShown = true;
            document.getElementById('restartHint').classList.add('show');
        }, 15000);

        // 点击返回四象首页（保留通关状态）
        document.body.addEventListener('click', () => {
            if (!allShown) return;
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease';
            setTimeout(() => {
                window.location.href = 'page2.html';
            }, 800);
        });
    </script>
</body>
</html>
